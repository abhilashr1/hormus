name: Bug report
description: Report a reproducible problem in Hormus
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit SHA
      placeholder: v0.1.0 or a commit SHA
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: database
    attributes:
      label: Database and version
      placeholder: PostgreSQL 16, MySQL 8.4
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Paste anything relevant here.
